  deploy:
#    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # NEW: This action sets up the tunnel and keys for you
      - name: Configure SSH for IAP
        # This command creates a ~/.ssh/config entry for your VM 
        # using the correct IAP tunnel settings automatically.
        run: |
          gcloud compute config-ssh --use-tunnel-through-iap --quiet

      - name: Run Ansible
        env:
          # Tell Ansible to use the system SSH config
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml \
            -e "strapi_image=4a1fc39" \
            -e "db_host=${{ secrets.DB_HOST }}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -e "region=${{ env.REGION }}"

