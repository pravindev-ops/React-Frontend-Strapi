name: Secure Build and Deploy (IAP)

on:
  push:
    branches: [ "main" ]
    paths: [ "backend/**", "docker-compose.yml", "ansible/**" ]

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  GAR_REPO: preveen-repo

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      strapi_tag: ${{ steps.meta-backend.outputs.tags }}
      frontend_tag: ${{ steps.meta-frontend.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: 'access_token'

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGION }}-docker.pkg.dev
          username: 'oauth2accesstoken'
          password: ${{ steps.auth.outputs.access_token }}

      # Backend Build
      - name: Meta Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.GAR_REPO }}/strapi-backend
          tags: latest

      - name: Build Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend-app
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}

