  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Prepare and Upload Deployment Package
        run: |
          # 1. Create a clean deployment folder
          mkdir -p deploy_pkg
          cp -r ansible deploy_pkg/
          cp docker-compose.yml deploy_pkg/

          # 2. Create the shell script that will run ON the VM
          cat << EOF > deploy_pkg/run_ansible.sh
          #!/bin/bash
          set -e
          echo "Starting local deployment on VM..."

          # Install Ansible if not present
          if ! command -v ansible-playbook &> /dev/null; then
            sudo apt-get update && sudo apt-get install -y ansible
          fi

          cd /tmp/deploy_pkg/ansible
          
          # Execute Ansible locally
          ansible-playbook -i inventory.ini deploy.yml \
            -e "strapi_image=${{ needs.build-and-push.outputs.strapi_tag }}" \
            -e "frontend_image=${{ needs.build-and-push.outputs.frontend_tag }}" \
            -e "db_host=${{ secrets.DB_HOST }}" \
            -e "db_password=${{ secrets.DB_PASSWORD }}" \
            -e "region=${{ env.REGION }}"
          EOF
          chmod +x deploy_pkg/run_ansible.sh

          # 3. Zip it up
          tar -czf deploy.tar.gz deploy_pkg/

          # 4. Upload to VM using IAP
          gcloud compute scp deploy.tar.gz elastic-search:/tmp/deploy.tar.gz \
            --zone=asia-south1-a \
            --tunnel-through-iap \
            --quiet

      - name: Execute Deployment on VM
        run: |
          # We use a single, simple command to trigger the uploaded script
          gcloud compute ssh elastic-search \
            --zone=asia-south1-a \
            --tunnel-through-iap \
            --quiet \
            --command="cd /tmp && tar -xzf deploy.tar.gz && bash /tmp/deploy_pkg/run_ansible.sh"