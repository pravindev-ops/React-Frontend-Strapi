[defaults]
inventory = inventory.ini
host_key_checking = False
# This is what makes small tasks fast
pipelining = True
gather_facts = False

[ssh_connection]
# Keep the tunnel open for 10 minutes
ssh_args = -o ControlMaster=auto -o ControlPersist=600s
# Use a very short path for the socket to avoid "Too long" errors
control_path = /tmp/ans-%%h