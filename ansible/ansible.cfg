[defaults]
inventory = inventory.ini
host_key_checking = False
# Pipelining reduces the number of SSH connections required
pipelining = True

[ssh_connection]
# ControlMaster=auto: Keeps the tunnel open
# ControlPersist=30m: Keeps it open for 30 minutes so tasks are instant
ssh_args = -o ControlMaster=auto -o ControlPersist=30m -o ConnectionAttempts=100
# Define where to store the temporary "socket" file
control_path = /tmp/ansible-ssh-%%h-%%p-%%r