[webservers]
# Replace your-project-id here to avoid lookup overhead
elastic-search zone=asia-south1-a ansible_user=ubuntu project_id=your-gcp-project-id

[webservers:vars]
ansible_ssh_common_args='-o ProxyCommand="gcloud compute start-iap-tunnel {{ inventory_hostname }} 22 --listen-on-stdin --zone={{ zone }} --project={{ project_id }} --quiet"'