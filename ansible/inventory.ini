; [webservers]
; # CHANGE root to ubuntu
; elastic-search zone=asia-south1-a ansible_user=ubuntu

; [webservers:vars]
; # Added --quiet and --project to ensure no prompts
; ansible_ssh_common_args='-o ProxyCommand="gcloud compute start-iap-tunnel {{ inventory_hostname }} 22 --listen-on-stdin --zone={{ zone }} --quiet --project={{ lookup(\"env\", \"PROJECT_ID\") }}"'

[webservers]
# Replace YOUR_GCP_PROJECT_ID with your actual project id string
elastic-search zone=asia-south1-a ansible_user=ubuntu project_id=gke-arena

[webservers:vars]
# Cleanest version of the ProxyCommand - no complex escaping
ansible_ssh_common_args='-o ProxyCommand="gcloud compute start-iap-tunnel {{ inventory_hostname }} 22 --listen-on-stdin --zone={{ zone }} --project={{ project_id }} --quiet"'